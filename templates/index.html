<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen2.5-7B AI 비서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .message { max-width: 80%; }
        #ttsToggle.muted { color: #6b7280; }
        #ttsToggle.active { color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-6 flex items-center justify-center gap-3">
            <i class="fas fa-robot"></i> Qwen2.5-7B AI
            
            <select id="voiceStyleSelect" class="bg-gray-800 text-sm text-gray-300 rounded-xl px-3 py-2 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 ml-2">
                <option value="default">기본 음성</option>
                <option value="cute" selected>여성 음성 🎀</option>
                <option value="deep">남성 음성 🎙️</option>
            </select>

            <button
                id="ttsToggle"
                onclick="toggleAutoTTS()"
                title="AI 답변 음성으로 읽기 켜기/끄기"
                class="active text-xl ml-1 hover:text-blue-300 transition">
                <i class="fas fa-volume-up"></i>
            </button>
            <button
                onclick="openMicSettings()"
                title="마이크 설정 및 테스트"
                class="text-xl ml-1 text-gray-400 hover:text-blue-300 transition">
                <i class="fas fa-microphone-lines"></i>
            </button>
        </h1>

        <div id="chat" class="chat-container bg-gray-800 rounded-2xl p-6 overflow-y-auto mb-4 space-y-4"></div>

        <div class="flex gap-2">
            <button 
                id="alwaysOnBtn"
                onclick="toggleAlwaysOn()"
                class="bg-gray-700 hover:bg-gray-600 px-4 rounded-xl font-medium transition text-sm flex items-center gap-2 text-gray-400 shrink-0"
                title="마이크를 항상 켜두고 대화가 끝나면 자동 전송합니다">
                <i class="fas fa-headset"></i> <span>상시 인식 끄기</span>
            </button>

            <input 
                id="input" 
                type="text" 
                class="flex-1 bg-gray-700 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="메시지를 입력하세요... (상시 인식이 꺼졌을 땐 창 클릭 후 V 키로 토글)"
                onkeypress="if(event.key === 'Enter') sendMessage()">
            <button 
                onclick="sendMessage()"
                class="bg-blue-600 hover:bg-blue-700 px-8 rounded-xl font-medium transition shrink-0">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <div id="micStatus" class="hidden mt-3 flex items-center justify-center gap-2 text-sm text-red-400">
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            <span id="micStatusText">음성 인식 중입니다...</span>
        </div>
    </div>

    <div id="micSettingsModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeMicSettings()">
        <div class="bg-gray-800 rounded-2xl w-full max-w-lg p-6 space-y-5 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-microphone-lines"></i> 마이크 설정 및 테스트
                </h2>
                <button onclick="closeMicSettings()" class="text-gray-400 hover:text-white text-xl">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <div class="bg-gray-900 rounded-xl p-4 text-sm space-y-2">
                <div class="flex justify-between">
                    <span class="text-gray-400">음성 인식(STT) 지원</span>
                    <span id="sttSupportBadge">확인 중...</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400">마이크 권한</span>
                    <span id="micPermissionBadge">확인 중...</span>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-sm text-gray-400 flex items-center justify-between">
                    입력 장치 선택
                    <button onclick="refreshMicDevices()" class="text-blue-400 hover:text-blue-300 text-xs">
                        <i class="fas fa-rotate"></i> 새로고침
                    </button>
                </label>
                <select id="micDeviceSelect" class="w-full bg-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option>장치 목록을 불러오려면 새로고침을 눌러주세요</option>
                </select>
            </div>
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-400">소리 감지 테스트</span>
                    <button id="levelTestBtn" onclick="toggleLevelTest()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-sm transition">
                        테스트 시작
                    </button>
                </div>
                <div class="w-full h-3 bg-gray-700 rounded-full overflow-hidden">
                    <div id="levelBar" class="h-full bg-green-500 transition-all" style="width: 0%"></div>
                </div>
            </div>
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-400">음성 → 텍스트 인식 테스트</span>
                    <button id="sttTestBtn" onclick="toggleSttTest()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-sm transition">
                        테스트 시작
                    </button>
                </div>
                <div id="sttTestResult" class="w-full min-h-[3rem] bg-gray-900 rounded-xl px-4 py-3 text-sm text-gray-300">
                    여기에 인식된 텍스트가 표시됩니다.
                </div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const ttsToggleBtn = document.getElementById('ttsToggle');
        const voiceStyleSelect = document.getElementById('voiceStyleSelect');
        const micStatusText = document.getElementById('micStatusText');
        let history = [];
        let idleTimer = null; 
        let isAlwaysOn = false; // 상시 음성인식 활성화 여부 flag

        /* ===================== 타이머: 5초 미입력 시 자동 전송 ===================== */
        function startIdleTimer() {
            stopIdleTimer();
            if (input.value.trim().length > 0) {
                idleTimer = setTimeout(() => {
                    if (isListening) {
                        stopVoiceInput(true); // 음성인식 종료하면서 메시지 자동 전송
                    } else {
                        sendMessage();
                    }
                }, 5000);
            }
        }

        function stopIdleTimer() {
            if (idleTimer) {
                clearTimeout(idleTimer);
                idleTimer = null;
            }
        }

        input.addEventListener('input', startIdleTimer);


        /* ===================== TTS (Text-to-Speech) ===================== */
        let autoTTSEnabled = true;   
        let koreanVoice = null;      

        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            const voices = speechSynthesis.getVoices();
            koreanVoice =
                voices.find(v => v.lang === 'ko-KR') ||
                voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ko')) ||
                null;
        }

        if ('speechSynthesis' in window) {
            loadVoices();
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function stripForSpeech(rawText) {
            const tmp = document.createElement('div');
            tmp.innerHTML = rawText;
            let text = tmp.textContent || tmp.innerText || '';
            text = text.replace(/[*_`#>~]/g, ' ');
            return text.replace(/\s+/g, ' ').trim();
        }

        function speakText(rawText) {
            if (!('speechSynthesis' in window)) return;
            const text = stripForSpeech(rawText);
            if (!text) return;

            speechSynthesis.cancel(); 

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ko-KR';
            if (koreanVoice) utter.voice = koreanVoice;

            const style = voiceStyleSelect.value;
            if (style === 'cute') {
                utter.pitch = 1.4; 
                utter.rate = 1.05;  
            } else if (style === 'deep') {
                utter.pitch = 0.7; 
                utter.rate = 0.95;
            } else {
                utter.pitch = 1.0; 
                utter.rate = 1.0;
            }

            speechSynthesis.speak(utter);
        }

        function stopSpeaking() {
            if ('speechSynthesis' in window) speechSynthesis.cancel();
        }

        function toggleAutoTTS() {
            autoTTSEnabled = !autoTTSEnabled;
            ttsToggleBtn.classList.toggle('active', autoTTSEnabled);
            ttsToggleBtn.classList.toggle('muted', !autoTTSEnabled);
            ttsToggleBtn.innerHTML = autoTTSEnabled
                ? '<i class="fas fa-volume-up"></i>'
                : '<i class="fas fa-volume-mute"></i>';
            if (!autoTTSEnabled) stopSpeaking();
        }


        /* ===================== 공통: SpeechRecognition 생성 팩토리 ===================== */
        function createSpeechRecognizer(onUpdate, getIsActive, onErrorCb) {
            const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognitionImpl) return null;

            const recog = new SpeechRecognitionImpl();
            recog.lang = 'ko-KR';
            recog.continuous = true;     
            recog.interimResults = true; 

            recog.onresult = (event) => {
                let finalText = '';
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) finalText += transcript;
                    else interimText += transcript;
                }
                onUpdate(finalText, interimText);
            };

            recog.onerror = (event) => {
                console.error('음성 인식 오류:', event.error);
                if (onErrorCb) onErrorCb(event.error);
            };

            recog.onend = () => {
                // 브라우저가 강제로 인식을 끊었을 때, 상시인식이나 V키 켜짐 상태라면 즉시 재시작
                if (getIsActive && getIsActive()) {
                    try { recog.start(); } catch (e) {}
                }
            };

            return recog;
        }


        /* ===================== STT 코어 로직 ===================== */
        const micStatus = document.getElementById('micStatus');
        let recognition = null;   
        let isListening = false;  
        let baseInputValue = '';  

        function startVoiceInput() {
            if (isListening) return;
            if (!recognition) {
                recognition = createSpeechRecognizer(
                    (finalText, interimText) => {
                        if (finalText) baseInputValue += finalText;
                        input.value = (baseInputValue + interimText).trim();
                        startIdleTimer(); // 실시간 말하는 중에도 5초 타이머 계속 갱신
                    },
                    () => isListening || isAlwaysOn, // 상시인식 켜져있으면 끝내지 않고 유지
                    () => stopVoiceInput(false)
                );
            }
            if (!recognition) {
                alert('이 브라우저는 음성 인식을 지원하지 않습니다.');
                return;
            }
            isListening = true;
            baseInputValue = input.value ? input.value + ' ' : '';
            
            // UI 문구 변경
            micStatusText.textContent = isAlwaysOn 
                ? "상시 음성 인식 활성화 중... (말을 멈추면 5초 뒤 자동 전송)" 
                : "음성 인식 중입니다... (V 키를 다시 누르면 종료 및 전송)";
            micStatus.classList.remove('hidden');
            
            try { recognition.start(); } catch (e) {}
        }

        function stopVoiceInput(autoSend = true) {
            if (!isListening) return;
            isListening = false;
            micStatus.classList.add('hidden');
            if (recognition) recognition.stop();
            
            if (autoSend) {
                setTimeout(() => {
                    sendMessage();
                }, 300);
            }
        }

        /* ===================== 상시 음성인식 토글 컨트롤 ===================== */
        function toggleAlwaysOn() {
            isAlwaysOn = !isAlwaysOn;
            const btn = document.getElementById('alwaysOnBtn');
            
            if (isAlwaysOn) {
                // 활성화 스타일 적용
                btn.classList.remove('bg-gray-700', 'text-gray-400', 'hover:bg-gray-600');
                btn.classList.add('bg-green-600', 'text-white', 'hover:bg-green-700');
                btn.querySelector('span').textContent = '상시 인식 켜짐';
                
                // 마이크 상시 기동 시작
                startVoiceInput();
            } else {
                // 비활성화 스타일 복구
                btn.classList.remove('bg-green-600', 'text-white', 'hover:bg-green-700');
                btn.classList.add('bg-gray-700', 'text-gray-400', 'hover:bg-gray-600');
                btn.querySelector('span').textContent = '상시 인식 끄기';
                
                // 마이크 끄기 (전송은 하지 않음)
                stopVoiceInput(false);
            }
        }

        // 키보드 V 토글 (상시 인식이 꺼져있을 때만 수동 작동)
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() !== 'v' || e.repeat || isAlwaysOn) return;
            
            const active = document.activeElement;
            const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
            if (isTyping) return; 
            
            e.preventDefault();
            if (isListening) {
                stopVoiceInput(true); 
            } else {
                startVoiceInput();   
            }
        });

        window.addEventListener('blur', () => {
            // 창 포커스를 잃어도 상시인식 모드라면 마이크를 강제로 끄지 않음 (최소화만 안 하면 유지됨)
            if (!isAlwaysOn) stopVoiceInput(false);
        });


        /* ===================== 마이크 설정 / 테스트 모달 (기존 동일) ===================== */
        const micSettingsModal = document.getElementById('micSettingsModal');
        const dsttSupportBadge = document.getElementById('sttSupportBadge');
        const dmicPermissionBadge = document.getElementById('micPermissionBadge');
        const dmicDeviceSelect = document.getElementById('micDeviceSelect');
        const dlevelTestBtn = document.getElementById('levelTestBtn');
        const dlevelBar = document.getElementById('levelBar');
        let micPermissionState = 'unknown';

        function setBadge(el, text, colorClass) { el.textContent = text; el.className = colorClass; }
        function updateSttSupportBadge() {
            const supported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
            setBadge(dsttSupportBadge, supported ? '지원됨 ✅' : '지원 안 됨 ❌', supported ? 'text-green-400' : 'text-red-400');
        }
        async function updateMicPermissionBadge() {
            if (!navigator.permissions || !navigator.permissions.query) return;
            try {
                const status = await navigator.permissions.query({ name: 'microphone' });
                micPermissionState = status.state;
                const map = { granted: ['허용됨 ✅', 'text-green-400'], denied: ['거부됨 ❌', 'text-red-400'], prompt: ['확인 필요 ⚠️', 'text-yellow-400'] };
                const [text, cls] = map[status.state] || ['알 수 없음', 'text-gray-400'];
                setBadge(dmicPermissionBadge, text, cls);
            } catch (e) {}
        }
        async function refreshMicDevices() {
            try { const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true }); tempStream.getTracks().forEach(t => t.stop()); } catch (err) { return; }
            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');
            dmicDeviceSelect.innerHTML = '';
            mics.forEach((d, i) => {
                const opt = document.createElement('option'); opt.value = d.deviceId; opt.textContent = d.label || `마이크 ${i + 1}`; dmicDeviceSelect.appendChild(opt);
            });
        }
        async function openMicSettings() { micSettingsModal.classList.remove('hidden'); updateSttSupportBadge(); await updateMicPermissionBadge(); if (micPermissionState === 'granted') refreshMicDevices(); }
        function closeMicSettings() { micSettingsModal.classList.add('hidden'); stopLevelTest(); stopSttTest(); }

        let levelStream = null; let levelAudioCtx = null; let levelAnalyser = null; let levelRAF = null; let isLevelTesting = false;
        async function toggleLevelTest() {
            if (isLevelTesting) { stopLevelTest(); return; }
            try { levelStream = await navigator.mediaDevices.getUserMedia({ audio: dmicDeviceSelect.value ? { deviceId: { exact: dmicDeviceSelect.value } } : true }); } catch (err) { return; }
            isLevelTesting = true; dlevelTestBtn.textContent = '테스트 중지';
            levelAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = levelAudioCtx.createMediaStreamSource(levelStream);
            levelAnalyser = levelAudioCtx.createAnalyser(); levelAnalyser.fftSize = 512; source.connect(levelAnalyser);
            const data = new Uint8Array(levelAnalyser.frequencyBinCount);
            function tick() {
                levelAnalyser.getByteFrequencyData(data);
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                dlevelBar.style.width = Math.min(100, Math.round((avg / 100) * 100)) + '%';
                levelRAF = requestAnimationFrame(tick);
            }
            tick();
        }
        function stopLevelTest() { isLevelTesting = false; if (dlevelTestBtn) dlevelTestBtn.textContent = '테스트 시작'; if (levelRAF) cancelAnimationFrame(levelRAF); if (levelStream) levelStream.getTracks().forEach(t => t.stop()); if (dlevelBar) dlevelBar.style.width = '0%'; }
        let testRecognition = null; let isTestListening = false;
        function toggleSttTest() {
            if (isTestListening) { stopSttTest(); return; }
            testRecognition = createSpeechRecognizer((f, i) => { document.getElementById('sttTestResult').textContent = f + i; }, () => isTestListening, () => stopSttTest());
            if (!testRecognition) return;
            isTestListening = true; document.getElementById('sttTestBtn').textContent = '테스트 중지'; try { testRecognition.start(); } catch (e) {}
        }
        function stopSttTest() { isTestListening = false; if (document.getElementById('sttTestBtn')) document.getElementById('sttTestBtn').textContent = '테스트 시작'; if (testRecognition) testRecognition.stop(); }


        /* ===================== 메시지 송수신 및 사이클 관리 ===================== */
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="message px-5 py-3 rounded-2xl ${role === 'user' ? 'bg-blue-600' : 'bg-gray-700'}">${content}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        let ws;
        function connectWebSocket() {
            ws = new WebSocket(`ws://${location.host}/ws/chat`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stream') {
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('div').textContent += data.content;
                } else if (data.type === 'done') {
                    history.push({role: "assistant", content: data.content});
                    if (autoTTSEnabled) speakText(data.content);
                }
            };
        }

        async function sendMessage() {
            stopIdleTimer(); 
            const message = input.value.trim();
            
            if (!message || !ws) {
                // 메시지가 비었는데 상시 인식이 켜져 있다면 다시 즉시 마이크 루프 가동
                if (isAlwaysOn && !isListening) startVoiceInput();
                return;
            }

            stopSpeaking(); 
            addMessage('user', message);
            history.push({role: "user", content: message});
            input.value = '';

            const assistantDiv = document.createElement('div');
            assistantDiv.className = "flex justify-start";
            assistantDiv.innerHTML = `<div class="message px-5 py-3 rounded-2xl bg-gray-700">생각중...</div>`;
            chat.appendChild(assistantDiv);
            chat.scrollTop = chat.scrollHeight;

            ws.send(JSON.stringify({ message: message, history: history }));

            // [핵심] 메시지가 전송 완료되면 상시 인식 모드일 때 자동으로 마이크를 리셋하여 다시 켭니다.
            if (isAlwaysOn) {
                setTimeout(() => {
                    startVoiceInput();
                }, 400); // 전송 패킷 처리와 꼬이지 않도록 미세한 버퍼 부여
            }
        }

        connectWebSocket();
    </script>
</body>
</html>
